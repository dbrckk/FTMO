<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>FTMO Edge AI</title>

  <script src="https://unpkg.com/lightweight-charts/dist/lightweight-charts.standalone.production.js"></script>
  <link rel="stylesheet" href="styles.css"/>
</head>

<body>
<div class="app-shell">

  <!-- TOP -->
  <header class="topbar">
    <div>
      <h1>FTMO EDGE</h1>
      <p id="localClock"></p>
    </div>

    <div class="topbar-actions">
      <span id="activeSessionPill" class="pill"></span>
      <span id="riskPill" class="pill"></span>
      <button id="settingsBtn" class="icon-btn">⚙️</button>
    </div>
  </header>

  <!-- HERO -->
  <section class="card hero">
    <div class="hero-main">
      <div>
        <h2 id="sessionHeadline"></h2>
        <p id="sessionSubline"></p>
      </div>

      <div class="hero-score-wrap">
        <div id="bestScore" class="hero-score">--</div>
        <span>Top score</span>
      </div>
    </div>
  </section>

  <!-- FTMO RISK -->
  <section class="card">
    <div class="section-title-row">
      <h3>FTMO Risk</h3>
      <span id="ftmoDecisionBadge" class="signal-badge">WAIT</span>
    </div>

    <div class="decision-grid">
      <div class="decision-box">
        <span>Daily remaining</span>
        <strong id="ftmoDailyRemaining">--</strong>
      </div>

      <div class="decision-box">
        <span>Max risk</span>
        <strong id="ftmoMaxAdditionalRisk">--</strong>
      </div>

      <div class="decision-box">
        <span>Decision</span>
        <strong id="ftmoDecisionText">--</strong>
        <small id="ftmoDecisionReason"></small>
      </div>
    </div>
  </section>

  <!-- PAIRS -->
  <section class="card">
    <div class="section-title-row">
      <h3>Paires</h3>
      <span id="pairCount"></span>
    </div>

    <input id="pairSearch" placeholder="Search pair..." />
    <div id="pairList"></div>
  </section>

  <!-- DETAIL -->
  <section class="card">
    <h3 id="selectedPairName"></h3>
    <span id="selectedSignalBadge"></span>

    <div id="summaryMetrics" class="metric-grid"></div>

    <div id="chart" class="chart-box"></div>

    <ul id="reasonList"></ul>
    <div id="gatekeeperBox"></div>
  </section>

  <!-- TRADE -->
  <section class="card">
    <h3>Trade</h3>

    <form id="tradeForm">
      <input id="tradePair" readonly />
      <select id="tradeDirection">
        <option value="buy">BUY</option>
        <option value="sell">SELL</option>
      </select>

      <input id="tradeCapital" placeholder="Capital"/>
      <input id="tradeEntry" placeholder="Entry"/>
      <input id="riskPercent" value="1"/>

      <textarea id="tradeNotes"></textarea>

      <button class="primary-btn">Ajouter Trade</button>
    </form>

    <div id="tradeSuggestionBox"></div>
  </section>

</div>

<script src="app.js"></script>
</body>
</html>
