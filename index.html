<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>FTMO Edge AI</title>

  <link rel="stylesheet" href="styles.css">
  <script src="https://unpkg.com/lightweight-charts/dist/lightweight-charts.standalone.production.js"></script>
</head>

<body>
<div class="app-shell">

<header class="topbar glass">
  <h1>FTMO Edge AI</h1>
  <button id="refreshBtn">↻</button>
</header>

<main class="layout">

<!-- HERO -->
<section class="card">
  <h2 id="sessionHeadline">Analyse en cours</h2>
  <div id="topPairLabel">--</div>
</section>

<!-- TOP P1 -->
<section class="card">
  <h3>Top 3 trades</h3>
  <div id="topPriorityTrades"></div>
</section>

<!-- BLOCKED -->
<section class="card">
  <h3>Top NO TRADE</h3>
  <div id="topBlockedTrades"></div>
</section>

<!-- CONTROLS -->
<section class="card">

<div class="row-actions">
  <button id="onlyP1Btn">Only P1</button>
  <button id="autoFocusBtn">Auto Focus</button>
  <button id="entrySniperBtn">Entry Sniper</button>
  <button id="exitSniperBtn">Exit Sniper</button>
</div>

</section>

<!-- LIST -->
<section class="card">
  <h3>Scanner</h3>
  <div id="pairList"></div>
</section>

<!-- DETAIL -->
<section class="card">
  <h3 id="selectedPairName">EURUSD</h3>

  <div id="summaryMetrics"></div>

  <div id="chart"></div>

  <ul id="reasonList"></ul>

  <div id="tradeSuggestionBox"></div>
  <div id="exitSuggestionBox"></div>
</section>

</main>
</div>

<script src="app.js"></script>
</body>
                                            </html>
