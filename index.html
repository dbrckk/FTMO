<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>FTMO EDGE AI</title>

  <link rel="stylesheet" href="styles.css" />

  <script src="https://unpkg.com/lightweight-charts/dist/lightweight-charts.standalone.production.js"></script>
</head>
<body>

<div class="app">

  <!-- HEADER -->
  <header class="topbar">
    <h1>FTMO EDGE AI</h1>

    <div class="top-controls">
      <button id="refreshBtn">Refresh</button>
      <button id="settingsBtn">Settings</button>
    </div>
  </header>

  <!-- CONTROLS -->
  <section class="card">
    <div class="row-actions">

      <button id="multiTfBtn" class="ghost-btn active-chip">Multi TF: ON</button>
      <button id="correlationBtn" class="ghost-btn active-chip">Correlation: ON</button>
      <button id="sessionKillBtn" class="ghost-btn active-chip">Session Kill: ON</button>
      <button id="newsKillBtn" class="ghost-btn active-chip">News Kill: ON</button>
      <button id="learningBtn" class="ghost-btn active-chip">Learning: ON</button>
      <button id="executionBtn" class="ghost-btn active-chip">Execution: ON</button>
      <button id="regimeBtn" class="ghost-btn active-chip">Regime: ON</button>
      <button id="confluenceBtn" class="ghost-btn active-chip">Confluence: ON</button>

    </div>
  </section>

  <!-- OVERVIEW -->
  <section class="card">
    <h2>Overview</h2>

    <div class="overview-grid">
      <div class="stat-card">
        <span>Best Pair</span>
        <strong id="topPairLabel">--</strong>
      </div>

      <div class="stat-card">
        <span>Reason</span>
        <strong id="topPairReason">--</strong>
      </div>

      <div class="stat-card">
        <span>Allowed</span>
        <strong id="allowedCount">--</strong>
      </div>

      <div class="stat-card">
        <span>Blocked</span>
        <strong id="blockedCount">--</strong>
      </div>
    </div>
  </section>

  <!-- SCANNER -->
  <section class="card">
    <h2>Scanner</h2>
    <div id="pairList"></div>
  </section>

  <!-- SELECTED -->
  <section class="card">
    <h2 id="selectedPairName">--</h2>

    <div class="overview-grid">

      <div class="stat-card">
        <span>Trend</span>
        <strong id="trendMini">--</strong>
      </div>

      <div class="stat-card">
        <span>Confidence</span>
        <strong id="confidenceMini">--</strong>
      </div>

      <div class="stat-card">
        <span>RR</span>
        <strong id="rrMini">--</strong>
      </div>

      <div class="stat-card">
        <span>Confluence</span>
        <strong id="confluenceMini">--</strong>
      </div>

      <div class="stat-card">
        <span>Regime</span>
        <strong id="regimeMini">--</strong>
      </div>

      <div class="stat-card">
        <span>Learning</span>
        <strong id="learningMini">--</strong>
      </div>

    </div>

    <div id="chart"></div>

    <div id="tradeSuggestionBox"></div>

  </section>

  <!-- TRADE PANEL -->
  <section class="card">
    <h2>Trade</h2>

    <form id="tradeForm">
      <input id="tradePair" placeholder="Pair" />
      <input id="tradeEntry" placeholder="Entry" />
      <input id="riskPercent" placeholder="Risk %" />
      <input id="tradeCapital" placeholder="Capital" />
      <button type="submit">Add Trade</button>
    </form>

    <div id="tradeList"></div>
  </section>

  <!-- CORRELATION -->
  <section class="card">
    <h2>Correlation Matrix</h2>
    <div id="correlationSummary"></div>
    <div id="correlationMatrixBox"></div>
  </section>

  <!-- SESSION -->
  <section class="card">
    <h2>Session Kill</h2>
    <div id="sessionKillSummary"></div>
  </section>

  <!-- NEWS -->
  <section class="card">
    <h2>News Kill</h2>
    <div id="newsKillSummary"></div>
  </section>

  <!-- LEARNING -->
  <section class="card">
    <h2>Learning</h2>
    <div id="learningSummary"></div>
  </section>

  <!-- EXECUTION -->
  <section class="card">
    <h2>Execution</h2>
    <div id="executionSummary"></div>
  </section>

  <!-- REGIME -->
  <section class="card">
    <h2>Regime</h2>
    <div id="regimeSummary"></div>
  </section>

  <!-- CONFLUENCE -->
  <section class="card">
    <h2>Confluence</h2>
    <div id="confluenceSummary"></div>
  </section>

</div>

<script src="app.js"></script>

</body>
        </html>
