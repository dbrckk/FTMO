<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>FTMO EDGE AI</title>

  <script src="https://unpkg.com/lightweight-charts/dist/lightweight-charts.standalone.production.js"></script>

  <link rel="stylesheet" href="style.css">
</head>

<body>

<!-- HEADER -->
<header class="header">
  <div class="logo">FTMO EDGE AI</div>

  <div class="header-right">
    <div id="localClock"></div>
    <div id="activeSessionPill" class="pill"></div>
    <div id="riskPill" class="pill"></div>
    <div id="marketBiasPill" class="pill"></div>
  </div>
</header>

<!-- SESSION -->
<section class="section">
  <h2 id="sessionHeadline"></h2>
  <p id="sessionSubline" class="muted"></p>
</section>

<!-- CONTROLS -->
<section class="controls">
  <div id="timeframeRow"></div>

  <select id="strategyMode">
    <option value="balanced">Balanced</option>
    <option value="trend">Trend</option>
    <option value="reversal">Reversal</option>
    <option value="breakout">Breakout</option>
    <option value="scalp">Scalp</option>
  </select>

  <select id="marketFilter">
    <option value="all">All</option>
    <option value="forex">Forex</option>
    <option value="yen">Yen</option>
    <option value="indices">Indices</option>
    <option value="metals">Metals</option>
  </select>

  <input id="pairSearch" placeholder="Search pair">

  <button id="refreshBtn">Refresh</button>
  <button id="recheckAiBtn">AI Refresh</button>
</section>

<!-- OVERVIEW -->
<section class="grid-4">
  <div>
    <h3 id="topPairLabel"></h3>
    <p id="topPairReason"></p>
  </div>

  <div>
    <strong id="allowedCount"></strong>
    <span>Allowed</span>
  </div>

  <div>
    <strong id="blockedCount"></strong>
    <span>Blocked</span>
  </div>

  <div>
    <strong id="globalExposure"></strong>
    <span>Exposure</span>
  </div>
</section>

<!-- PAIRS -->
<section>
  <h2>Pairs (<span id="pairCount"></span>)</h2>
  <div id="pairList"></div>
</section>

<!-- SELECTED -->
<section class="selected">

  <h2>
    <span id="selectedPairName"></span>
    <span id="selectedSignalBadge" class="badge"></span>
  </h2>

  <div id="summaryMetrics" class="grid"></div>

  <div class="mini-stats">
    <span id="trendMini"></span>
    <span id="confidenceMini"></span>
    <span id="rrMini"></span>
    <span id="aiMini"></span>
  </div>

  <div id="chart"></div>

  <ul id="reasonList"></ul>

  <div id="gatekeeperBox"></div>

</section>

<!-- TRADE -->
<section>

  <h2>Trade</h2>

  <form id="tradeForm">

    <input id="tradePair" placeholder="Pair">
    <select id="tradeDirection">
      <option value="buy">BUY</option>
      <option value="sell">SELL</option>
    </select>

    <input id="tradeCapital" placeholder="Capital">
    <input id="tradeEntry" placeholder="Entry">
    <input id="riskPercent" placeholder="Risk %">

    <textarea id="tradeNotes" placeholder="Notes"></textarea>

    <button type="submit">Add Trade</button>
  </form>

  <div id="tradeSuggestionBox"></div>
  <div id="exitSuggestionBox"></div>

</section>

<!-- TRADES -->
<section>
  <h2>Trades (<span id="tradeStats"></span>)</h2>
  <div id="tradeList"></div>
</section>

<!-- WATCHLIST -->
<section>
  <h2>Watchlist (<span id="watchlistCount"></span>)</h2>
  <button id="watchlistBtn">Toggle</button>
  <div id="watchlist"></div>
</section>

<!-- FTMO -->
<section>
  <h2 id="ftmoRiskTitle"></h2>
  <div id="ftmoDecisionBadge"></div>

  <div id="ftmoDailyRemaining"></div>
  <div id="ftmoDailyHint"></div>

  <div id="ftmoMaxAdditionalRisk"></div>
  <div id="ftmoRiskHint"></div>

  <div id="ftmoDecisionText"></div>
  <div id="ftmoDecisionReason"></div>
</section>

<!-- AI DECISION -->
<section>
  <h2 id="decisionAsset"></h2>
  <div id="decisionBadge"></div>

  <p id="decisionText"></p>
  <p id="decisionReason"></p>

  <div id="decisionConfidence"></div>
  <div id="decisionRiskMode"></div>
  <div id="decisionAction"></div>
  <div id="decisionWindow"></div>
</section>

<!-- JOURNAL -->
<section>
  <h2>Journal</h2>

  <div id="journalMeta"></div>
  <div id="journalWinRate"></div>
  <div id="journalExpectancy"></div>

  <div id="journalBestPair"></div>
  <div id="journalBestPairHint"></div>

  <div id="journalBestSession"></div>
  <div id="journalBestSessionHint"></div>

  <ul id="journalInsights"></ul>
</section>

<!-- SETTINGS -->
<div id="settingsModal" class="modal hidden">

  <div class="modal-content">

    <button id="closeSettingsBtn">X</button>

    <select id="groqModel">
      <option value="llama-3.1-8b-instant">Llama 3</option>
    </select>

    <select id="aiMode">
      <option value="strict">Strict</option>
      <option value="balanced">Balanced</option>
      <option value="aggressive">Aggressive</option>
    </select>

    <input id="macroCooldown" placeholder="Cooldown">

    <button id="saveSettingsBtn">Save</button>

  </div>

</div>

<button id="settingsBtn">Settings</button>

<script src="app.js"></script>

</body>
                                </html>
