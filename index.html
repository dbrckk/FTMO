<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>FTMO EDGE AI</title>

  <!-- Lightweight Charts -->
  <script src="https://unpkg.com/lightweight-charts/dist/lightweight-charts.standalone.production.js"></script>

  <style>
    body {
      background: #0b0b0b;
      color: white;
      font-family: Arial;
    }

    .pair-row {
      display: flex;
      justify-content: space-between;
      padding: 10px;
      border-bottom: 1px solid rgba(255,255,255,0.05);
      cursor: pointer;
    }

    .ok { color: #22c55e; }
    .bad { color: #ef4444; }

    .metric-card {
      display: inline-block;
      padding: 10px;
      background: rgba(255,255,255,0.05);
      margin: 5px;
      border-radius: 6px;
    }
  </style>
</head>

<body>

  <h1>FTMO EDGE AI</h1>

  <button id="refreshBtn">Refresh</button>

  <div id="pairList"></div>

  <h2>Selected</h2>
  <div id="selectedPairName"></div>

  <div id="summaryMetrics"></div>

  <div id="tradeSuggestionBox"></div>
  <div id="exitSuggestionBox"></div>

  <div id="chart" style="height:300px;"></div>

  <!-- CRUCIAL -->
  <script type="module" src="./app.js"></script>

</body>
</html>
