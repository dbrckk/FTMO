name: Sync market candles to D1

on:
  workflow_dispatch:
  schedule:
    - cron: "*/15 * * * *"

jobs:
  sync-market:
    runs-on: ubuntu-latest
    steps:
      - name: Call sync endpoint
        run: |
          HTTP_CODE=$(curl -sS \
            -o response.json \
            -w "%{http_code}" \
            "${{ secrets.SITE_URL }}/api/sync-market?token=${{ secrets.SYNC_SECRET }}")

          echo "HTTP_CODE=$HTTP_CODE"
          cat response.json || true

          if [ "$HTTP_CODE" -lt 200 ] || [ "$HTTP_CODE" -ge 300 ]; then
            exit 1
          fi
